name: IaC Modules Release Readiness

on:
  workflow_dispatch:
  push:
    tags:
      - "iac-v*"

jobs:
  terraform-module:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/terraform/aws-nexus-ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init + validate
        run: |
          terraform init -backend=false
          terraform validate

      - name: Package terraform module
        run: |
          cd ..
          tar -czf aws-nexus-ai-terraform-module.tgz aws-nexus-ai

      - name: Upload terraform module artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-nexus-ai-terraform-module
          path: deploy/terraform/aws-nexus-ai-terraform-module.tgz

  pulumi-module:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/pulumi/aws-nexus-ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Pulumi module and templates
        run: |
          python -m py_compile __main__.py
          python -m py_compile templates/*.py

      - name: Package pulumi module
        run: |
          cd ..
          tar -czf aws-nexus-ai-pulumi-module.tgz aws-nexus-ai

      - name: Upload pulumi module artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-nexus-ai-pulumi-module
          path: deploy/pulumi/aws-nexus-ai-pulumi-module.tgz
