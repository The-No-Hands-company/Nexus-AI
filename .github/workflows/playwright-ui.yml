name: Playwright UI

on:
  pull_request:
    paths:
      - 'static/**'
      - 'tests/playwright/**'
      - '.github/workflows/playwright-ui.yml'
  push:
    paths:
      - 'static/**'
      - 'tests/playwright/**'
      - '.github/workflows/playwright-ui.yml'
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Install Playwright dependencies
        working-directory: tests/playwright
        run: npm ci

      - name: Install Chromium
        working-directory: tests/playwright
        run: npx playwright install --with-deps chromium

      - name: Start Nexus AI server
        run: |
          python main.py > /tmp/nexus-playwright-server.log 2>&1 &
          echo $! > /tmp/nexus-playwright-server.pid

      - name: Wait for server readiness
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/nexus-playwright-server.log
          exit 1

      - name: Run Playwright UI tests
        working-directory: tests/playwright
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/playwright-report
          if-no-files-found: ignore

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/nexus-playwright-server.pid ]; then
            kill $(cat /tmp/nexus-playwright-server.pid) || true
          fi
