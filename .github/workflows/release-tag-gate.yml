name: Release Tag Gate

on:
  workflow_run:
    workflows:
      - Electron Build and Release
      - Mobile Capacitor CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_branch:
        description: Release branch to validate and tag
        required: true
        default: release
      tag_name:
        description: Tag to create, for example v1.2.3
        required: true

jobs:
  branch_gate:
    if: github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch == 'release' || startsWith(github.event.workflow_run.head_branch, 'release/'))
    runs-on: ubuntu-latest

    steps:
      - name: Verify release branch workflow pair
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;
            const branch = context.payload.workflow_run.head_branch;
            const required = ['Electron Build and Release', 'Mobile Capacitor CI'];
            const results = {};
            for (const name of required) {
              const runs = await github.rest.actions.listWorkflowRunsForRepo({ owner, repo, branch, per_page: 50 });
              const match = runs.data.workflow_runs.find((run) => run.name === name && run.head_sha === headSha && run.status === 'completed');
              results[name] = match ? match.conclusion : 'missing';
            }
            core.info(JSON.stringify({ branch, headSha, results }, null, 2));
            const failed = Object.entries(results).filter(([, conclusion]) => conclusion !== 'success');
            if (failed.length) {
              core.setFailed(`Release branch gate failed for ${headSha}: ${failed.map(([name, c]) => `${name}=${c}`).join(', ')}`);
            }

  create_tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate branch workflow status and create tag
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = core.getInput('release_branch');
            const tagName = core.getInput('tag_name');
            const required = ['Electron Build and Release', 'Mobile Capacitor CI'];
            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const headSha = ref.data.object.sha;

            const results = {};
            for (const name of required) {
              const runs = await github.rest.actions.listWorkflowRunsForRepo({ owner, repo, branch, per_page: 50 });
              const match = runs.data.workflow_runs.find((run) => run.name === name && run.head_sha === headSha && run.status === 'completed');
              results[name] = match ? match.conclusion : 'missing';
            }
            core.info(JSON.stringify({ branch, headSha, results }, null, 2));
            const failed = Object.entries(results).filter(([, conclusion]) => conclusion !== 'success');
            if (failed.length) {
              core.setFailed(`Cannot tag ${headSha}. Required workflows are not green: ${failed.map(([name, c]) => `${name}=${c}`).join(', ')}`);
              return;
            }

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tagName}` });
              core.setFailed(`Tag ${tagName} already exists.`);
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${tagName}`, sha: headSha });
            core.notice(`Created tag ${tagName} at ${headSha}`);
