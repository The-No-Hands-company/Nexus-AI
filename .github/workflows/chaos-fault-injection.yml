name: Chaos Fault Injection

on:
  workflow_dispatch:
  schedule:
    - cron: "50 3 * * *"
  pull_request:
    paths:
      - "src/webhooks_delivery.py"
      - "tests/test_chaos_fault_injection.py"
      - ".github/workflows/chaos-fault-injection.yml"

jobs:
  chaos:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      NEXUS_CHAOS_MODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run chaos and fault-injection tests and write summary
        run: |
          set +e
          start_ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          python -m pytest tests/test_chaos_fault_injection.py -q
          rc=$?
          end_ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          status="passed"
          if [[ $rc -ne 0 ]]; then
            status="failed"
          fi
          export START_TS="$start_ts"
          export END_TS="$end_ts"
          export STATUS="$status"
          export EXIT_CODE="$rc"
          python - <<'PY'
import json
import os

summary = {
    "workflow": "chaos-fault-injection",
    "status": os.getenv("STATUS", "unknown"),
    "exit_code": int(os.getenv("EXIT_CODE", "1")),
    "start_time_utc": os.getenv("START_TS", ""),
    "end_time_utc": os.getenv("END_TS", ""),
    "run_id": os.getenv("GITHUB_RUN_ID", ""),
    "run_number": os.getenv("GITHUB_RUN_NUMBER", ""),
    "sha": os.getenv("GITHUB_SHA", ""),
    "ref": os.getenv("GITHUB_REF", ""),
    "suite": "tests/test_chaos_fault_injection.py",
}

with open("chaos-summary.json", "w", encoding="utf-8") as f:
    json.dump(summary, f, indent=2)
PY
          exit $rc

      - name: Upload chaos JSON summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-summary
          path: chaos-summary.json
