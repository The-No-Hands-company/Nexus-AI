apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ai
  namespace: nexus-ai
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nexus.example.com   # replace with your domain
      secretName: nexus-ai-tls  # pragma: allowlist secret
  rules:
    - host: nexus.example.com  # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-ai
                port:
                  number: 80
