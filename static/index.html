<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Alt</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:      #0a0a0f;
      --surface: #111118;
      --border:  #1e1e2e;
      --accent:  #7c6af7;
      --accent2: #5eead4;
      --text:    #e2e8f0;
      --muted:   #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.03em; }
    .logo span { color: var(--accent); }
    .provider-badge {
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px; border-radius: 99px;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .btn-clear {
      font-size: 0.75rem; color: var(--muted); background: none; border: none;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .btn-clear:hover { color: var(--text); background: var(--border); }

    /* ── messages area ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 24px 0;
      display: flex; flex-direction: column; gap: 20px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      padding: 0 20px;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user  { justify-content: flex-end; }
    .msg-row.agent { justify-content: flex-start; }

    .bubble {
      max-width: min(680px, 85vw);
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .msg-row.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.agent .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* markdown inside bubble */
    .bubble h1,.bubble h2,.bubble h3 { font-weight: 700; margin: .6em 0 .3em; }
    .bubble h1 { font-size: 1.2em; }
    .bubble h2 { font-size: 1.05em; }
    .bubble p  { margin: .4em 0; }
    .bubble ul,.bubble ol { margin: .4em 0 .4em 1.4em; }
    .bubble li { margin: .15em 0; }
    .bubble code {
      background: rgba(255,255,255,.08); padding: 1px 5px;
      border-radius: 4px; font-size: .85em; font-family: 'Fira Code', monospace;
    }
    .bubble pre {
      background: rgba(0,0,0,.4); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; overflow-x: auto; margin: .5em 0;
    }
    .bubble pre code { background: none; padding: 0; font-size: .82em; }
    .bubble strong { font-weight: 600; }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: .8em 0; }
    .bubble a { color: var(--accent2); text-decoration: underline; }

    /* tool steps */
    .tool-step {
      font-size: .78rem; color: var(--muted);
      background: rgba(0,0,0,.3);
      border-left: 2px solid var(--accent);
      padding: 4px 10px; border-radius: 0 6px 6px 0;
      margin: 4px 0; font-family: monospace;
    }

    /* typing indicator */
    .typing { display: flex; align-items: center; gap: 5px; padding: 0 20px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); opacity: .4;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity: .4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* welcome */
    #welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      gap: 12px; padding: 40px 20px;
    }
    #welcome h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.04em; }
    #welcome h2 span { color: var(--accent); }
    #welcome p { color: var(--muted); font-size: .9rem; max-width: 360px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .chip {
      font-size: .78rem; padding: 6px 14px; border-radius: 99px;
      border: 1px solid var(--border); color: var(--muted);
      cursor: pointer; transition: all .15s; background: var(--surface);
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }

    /* ── input bar ── */
    footer {
      flex-shrink: 0;
      padding: 12px 20px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-row {
      display: flex; gap: 10px; max-width: 760px; margin: 0 auto;
    }
    #task {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-size: .9rem;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color .15s;
    }
    #task:focus { border-color: var(--accent); }
    #task::placeholder { color: var(--muted); }
    #send-btn {
      flex-shrink: 0;
      background: var(--accent);
      border: none; border-radius: 12px;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: opacity .15s, transform .1s;
      align-self: flex-end;
    }
    #send-btn:hover { opacity: .85; }
    #send-btn:active { transform: scale(.93); }
    #send-btn:disabled { opacity: .35; cursor: not-allowed; }
    #send-btn svg { width: 20px; height: 20px; fill: #fff; }
    .input-hint { text-align: center; font-size: .72rem; color: var(--muted); margin-top: 6px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Claude <span>Alt</span></div>
  <div class="header-actions">
    <span class="provider-badge" id="provider-badge">Loading…</span>
    <button class="btn-clear" onclick="clearChat()">New chat</button>
  </div>
</header>

<!-- messages OR welcome screen -->
<div id="chat-area" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
  <div id="welcome">
    <h2>What can I <span>help</span> you build?</h2>
    <p>A self-hosted code agent that can read, write, and commit files to your repo.</p>
    <div class="chips">
      <div class="chip" onclick="fillTask('List all files in the repo')">📂 List files</div>
      <div class="chip" onclick="fillTask('Read the README')">📖 Read README</div>
      <div class="chip" onclick="fillTask('Add a CHANGELOG.md with today\\'s date')">📝 Write a file</div>
      <div class="chip" onclick="fillTask('Explain what this project does')">💡 Explain project</div>
    </div>
  </div>
  <div id="messages" style="display:none;"></div>
</div>

<footer>
  <div class="input-row">
    <textarea id="task" placeholder="Ask anything or give a task…" rows="1"></textarea>
    <button id="send-btn" onclick="sendTask()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for newline</div>
</footer>

<script>
  marked.setOptions({ breaks: true, gfm: true });

  let sessionId = null;
  let busy = false;

  // ── init ──────────────────────────────────────────────────────────────────
  async function init() {
    // fetch provider info
    try {
      const h = await fetch('/health').then(r => r.json());
      const badge = document.getElementById('provider-badge');
      badge.textContent = h.provider || 'unknown';
      if (h.provider === 'claude') badge.style.color = '#f97316';
    } catch {}

    // start a session
    const s = await fetch('/session', { method: 'POST' }).then(r => r.json());
    sessionId = s.session_id;
  }

  // ── auto-resize textarea ──────────────────────────────────────────────────
  const ta = document.getElementById('task');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTask(); }
  });

  // ── chip helper ───────────────────────────────────────────────────────────
  function fillTask(txt) {
    ta.value = txt;
    ta.dispatchEvent(new Event('input'));
    ta.focus();
  }

  // ── show messages area ────────────────────────────────────────────────────
  function showMessages() {
    document.getElementById('welcome').style.display  = 'none';
    const msgs = document.getElementById('messages');
    msgs.style.display = 'flex';
  }

  // ── add bubble ────────────────────────────────────────────────────────────
  function addBubble(role, html) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;
    row.appendChild(bubble);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return bubble;
  }

  // ── typing indicator ──────────────────────────────────────────────────────
  let typingEl = null;
  function showTyping() {
    const msgs = document.getElementById('messages');
    typingEl = document.createElement('div');
    typingEl.className = 'typing';
    typingEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    msgs.appendChild(typingEl);
    msgs.scrollTop = msgs.scrollHeight;
  }
  function hideTyping() { typingEl && typingEl.remove(); }

  // ── render agent markdown ─────────────────────────────────────────────────
  function renderAgent(raw) {
    // Split on tool-step lines (lines starting with icon + backtick)
    const lines = raw.split('\n');
    let html = '';
    let mdLines = [];

    const flushMd = () => {
      if (mdLines.length) {
        html += marked.parse(mdLines.join('\n'));
        mdLines = [];
      }
    };

    for (const line of lines) {
      if (/^[📝📖📂🗑️⚙️🚀🔧]\s+\*\*/.test(line)) {
        flushMd();
        html += `<div class="tool-step">${line.replace(/\*\*/g, '')}</div>`;
      } else {
        mdLines.push(line);
      }
    }
    flushMd();
    return html;
  }

  // ── main send ─────────────────────────────────────────────────────────────
  async function sendTask() {
    const val = ta.value.trim();
    if (!val || busy) return;

    busy = true;
    document.getElementById('send-btn').disabled = true;

    showMessages();
    addBubble('user', escapeHtml(val).replace(/\n/g, '<br>'));

    ta.value = '';
    ta.style.height = 'auto';
    showTyping();

    try {
      const res = await fetch('/agent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task: val, session_id: sessionId })
      });
      const data = await res.json();
      hideTyping();

      if (data.error) {
        addBubble('agent', `<span style="color:#f87171">❌ ${escapeHtml(data.error)}</span>`);
      } else {
        addBubble('agent', renderAgent(data.result || ''));
      }
    } catch (err) {
      hideTyping();
      addBubble('agent', `<span style="color:#f87171">❌ Network error: ${escapeHtml(err.message)}</span>`);
    }

    busy = false;
    document.getElementById('send-btn').disabled = false;
    ta.focus();
  }

  // ── clear ─────────────────────────────────────────────────────────────────
  async function clearChat() {
    if (sessionId) {
      await fetch(`/session/${sessionId}`, { method: 'DELETE' }).catch(() => {});
    }
    const s = await fetch('/session', { method: 'POST' }).then(r => r.json());
    sessionId = s.session_id;

    document.getElementById('messages').innerHTML = '';
    document.getElementById('messages').style.display = 'none';
    document.getElementById('welcome').style.display = 'flex';
    ta.focus();
  }

  // ── escape ────────────────────────────────────────────────────────────────
  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
