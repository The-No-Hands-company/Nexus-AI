<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus AI Mobile</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nexus AI" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nexus AI" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: #0a0f1a;
      color: #e2e8f0;
      overflow-x: hidden;
    }

    .App {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .App-header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }

    .App-header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .notification-badge {
      position: relative;
    }

    .notification-count {
      background: #ef4444;
      color: white;
      border-radius: 50%;
      padding: 4px 8px;
      font-size: 0.75rem;
      font-weight: bold;
      position: absolute;
      top: -5px;
      right: -5px;
    }

    main {
      flex: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      width: 100%;
    }

    .chat-container {
      background: #111827;
      border-radius: 12px;
      border: 1px solid #334155;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 200px);
      min-height: 400px;\n    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
    }

    .message.user {
      background: #3b82f6;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #1f2937;
      border: 1px solid #374151;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.image-message {
      background: #1e1b4b;
      border-color: #4338ca;
      max-width: 100%;
      padding: 16px;
    }

    .message-content img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .message-time {
      font-size: 0.75rem;
      opacity: 0.7;
      margin-top: 4px;
      display: block;
    }

    .chat-input-container {
      border-top: 1px solid #334155;
      padding: 16px;
      background: #1f2937;
    }

    .input-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab-button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #374151;
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-button.active {
      background: #3b82f6;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #374151;
      border-radius: 8px;
      background: #111827;
      color: #e2e8f0;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 60px;
      margin-bottom: 12px;
    }

    .button-group {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
    }

    button:hover:not(:disabled) {
      background: #2563eb;
    }

    button:disabled {
      background: #4b5563;
      cursor: not-allowed;
      opacity: 0.6;
    }

    button.image-button {
      background: #10b981;
    }

    button.image-button:hover:not(:disabled) {
      background: #059669;
    }

    .generated-images-section {
      margin-top: 20px;
      padding: 20px;
      background: #1f2937;
      border-radius: 8px;
      border: 1px solid #374151;
    }

    .generated-images-section h3 {
      margin-top: 0;
      color: #e2e8f0;
    }

    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .image-card {
      background: #111827;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #374151;
    }

    .image-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .image-card p {
      padding: 8px;
      margin: 0;
      font-size: 0.875rem;
      color: #cbd5e1;
    }

    .share-button {
      width: 100%;
      padding: 8px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 0 0 8px 8px;
      cursor: pointer;
      font-size: 0.875rem;
    }

    .share-button:hover {
      background: #4f46e5;
    }

    .preferences-panel {
      margin-top: 20px;
      padding: 16px;
      background: #1f2937;
      border-radius: 8px;
      border: 1px solid #374151;
    }

    .preferences-panel h3 {
      margin-top: 0;
      color: #e2e8f0;
    }

    label {
      display: block;
      margin: 12px 0;
      cursor: pointer;
    }

    input[type="checkbox"] {
      margin-right: 8px;
      width: 18px;
      height: 18px;
      accent-color: #3b82f6;
    }

    @media (max-width: 768px) {
      main {
        padding: 16px;
      }

      .chat-container {
        height: calc(100vh - 160px);
      }

      .message {
        max-width: 90%;
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-mrvIhWqR.js"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
