<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus AI</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
          Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        background-color: #0d1117;
        height: 100vh;
        display: flex;
      }
      
      #root {
        width: 100%;
        height: 100%;
      }
      
      .App {
        width: 100%;
        max-width: 680px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        height: 100%;
        background-color: #161b22;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
        overflow: hidden;
      }
      
      .App-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 1.25rem 1.5rem 0;
        text-align: center;
      }
      
      .App-header h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }
      
      .header-tabs {
        display: flex;
        gap: 0.25rem;
        justify-content: center;
        margin-top: 0.5rem;
      }
      
      .header-tab {
        padding: 0.6rem 1.5rem;
        border: none;
        background: rgba(255,255,255,0.15);
        color: rgba(255,255,255,0.8);
        border-radius: 8px 8px 0 0;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      .header-tab.active {
        background: #161b22;
        color: #e0e0e0;
      }
      
      .header-tab:hover:not(.active) {
        background: rgba(255,255,255,0.25);
        color: white;
      }
      
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      
      .chat-container {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 1rem;
        overflow: hidden;
      }
      
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding-bottom: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      
      .message {
        max-width: 80%;
        word-wrap: break-word;
      }
      
      .message.user {
        align-self: flex-end;
        background-color: #4a6cf7;
        color: white;
        border-radius: 18px 18px 4px 18px;
        padding: 0.75rem 1rem;
      }
      
      .message.assistant {
        align-self: flex-start;
        background-color: #21262d;
        color: #c9d1d9;
        border-radius: 18px 18px 18px 4px;
        padding: 0.75rem 1rem;
      }
      
      .message.image-message {
        align-self: center;
        max-width: 90%;
        text-align: center;
      }
      
      .message-content {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      .message-content p {
        margin: 0 0 0.25rem 0;
        line-height: 1.4;
        text-align: center;
      }
      
      .generated-image {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        margin: 0.5rem 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }
      
      .message-time {
        font-size: 0.75rem;
        opacity: 0.7;
        margin-top: 0.25rem;
        align-self: flex-end;
      }
      
      .chat-input-container {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-top: 0.5rem;
        padding-top: 0.75rem;
        border-top: 1px solid #30363d;
      }
      
      .chat-input-container textarea,
      .chat-input-container input {
        width: 100%;
        min-height: 44px;
        padding: 0.75rem 1rem;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 12px;
        color: #c9d1d9;
        font-size: 0.9rem;
        font-family: inherit;
        resize: vertical;
        transition: border-color 0.2s;
      }
      
      .chat-input-container textarea:focus,
      .chat-input-container input:focus {
        outline: none;
        border-color: #4a6cf7;
        box-shadow: 0 0 0 2px rgba(74,108,247,0.2);
      }
      
      .button-group {
        display: flex;
        gap: 0.5rem;
      }
      
      .button-group button {
        flex: 1;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 0.75rem;
        border-radius: 12px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      
      .button-group button:hover:not(:disabled) {
        opacity: 0.9;
      }
      
      .button-group button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: #3a3a3a;
      }
      
      .team-container {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      
      .sprint-section {
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 1.25rem;
      }
      
      .sprint-section h2,
      .skills-section h2 {
        color: #e0e0e0;
        font-size: 1.1rem;
        margin-bottom: 0.25rem;
      }
      
      .section-desc {
        color: #8b949e;
        font-size: 0.85rem;
        margin-bottom: 0.75rem;
      }
      
      .sprint-input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        color: #c9d1d9;
        font-size: 0.85rem;
        font-family: inherit;
        margin-bottom: 0.5rem;
        resize: vertical;
        transition: border-color 0.2s;
      }
      
      .sprint-input:focus {
        outline: none;
        border-color: #4a6cf7;
        box-shadow: 0 0 0 2px rgba(74,108,247,0.2);
      }
      
      .sprint-btn {
        width: 100%;
        margin-top: 0.25rem;
        padding: 0.6rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.85rem;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      
      .sprint-btn:hover:not(:disabled) {
        opacity: 0.9;
      }
      
      .sprint-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: #3a3a3a;
      }
      
      .skills-section h2 {
        margin-bottom: 0.75rem;
      }
      
      .loading {
        color: #8b949e;
        font-size: 0.9rem;
        text-align: center;
        padding: 1rem;
      }
      
      .error-message {
        color: #f85149;
        background: rgba(248,81,73,0.1);
        border: 1px solid rgba(248,81,73,0.3);
        border-radius: 6px;
        padding: 0.5rem 0.75rem;
        font-size: 0.85rem;
        margin-top: 0.5rem;
      }
      
      .no-skills {
        color: #8b949e;
        font-size: 0.9rem;
        text-align: center;
        padding: 1rem;
      }
      
      .skills-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.75rem;
      }
      
      .skill-card {
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 10px;
        padding: 1rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      .skill-card:hover {
        border-color: #4a6cf7;
        background: #262d3a;
        transform: translateY(-1px);
      }
      
      .skill-card-header {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        margin-bottom: 0.5rem;
      }
      
      .skill-card h3 {
        color: #e0e0e0;
        font-size: 1rem;
        margin: 0;
        text-transform: capitalize;
      }
      
      .skill-command {
        display: inline-block;
        background: rgba(74,108,247,0.15);
        color: #7c9fff;
        padding: 0.15rem 0.5rem;
        border-radius: 4px;
        font-size: 0.78rem;
        font-family: 'Consolas', 'Monaco', monospace;
        align-self: flex-start;
      }
      
      .skill-desc {
        color: #8b949e;
        font-size: 0.82rem;
        line-height: 1.4;
        margin: 0;
      }
      
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 1rem;
      }
      
      .modal-content {
        background: #1a1d28;
        border: 1px solid #30363d;
        border-radius: 14px;
        padding: 1.5rem;
        width: 100%;
        max-width: 520px;
        max-height: 85vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .modal-header h2 {
        color: #e0e0e0;
        font-size: 1.15rem;
        margin: 0;
        text-transform: capitalize;
      }
      
      .modal-close {
        background: none;
        border: none;
        color: #8b949e;
        font-size: 1.5rem;
        cursor: pointer;
        padding: 0;
        line-height: 1;
        transition: color 0.2s;
      }
      
      .modal-close:hover {
        color: #c9d1d9;
      }
      
      .modal-command {
        display: inline-block;
        background: rgba(74,108,247,0.15);
        color: #7c9fff;
        padding: 0.25rem 0.6rem;
        border-radius: 4px;
        font-size: 0.82rem;
        font-family: 'Consolas', 'Monaco', monospace;
        align-self: flex-start;
      }
      
      .modal-desc {
        color: #8b949e;
        font-size: 0.85rem;
        line-height: 1.4;
        margin: 0;
      }
      
      .modal-input {
        width: 100%;
        padding: 0.75rem;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        color: #c9d1d9;
        font-size: 0.85rem;
        font-family: inherit;
        resize: vertical;
        transition: border-color 0.2s;
      }
      
      .modal-input:focus {
        outline: none;
        border-color: #4a6cf7;
        box-shadow: 0 0 0 2px rgba(74,108,247,0.2);
      }
      
      .modal-buttons {
        display: flex;
        gap: 0.5rem;
      }
      
      .btn-primary {
        flex: 1;
        padding: 0.6rem 1rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.85rem;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      
      .btn-primary:hover:not(:disabled) {
        opacity: 0.9;
      }
      
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: #3a3a3a;
      }
      
      .btn-secondary {
        padding: 0.6rem 1rem;
        background: #21262d;
        color: #c9d1d9;
        border: 1px solid #30363d;
        border-radius: 8px;
        font-size: 0.85rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      
      .btn-secondary:hover {
        background: #30363d;
      }
      
      .result-panel {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 0.75rem;
        margin-top: 0.25rem;
        max-height: 250px;
        overflow-y: auto;
      }
      
      .result-panel pre {
        color: #7ee787;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 0.78rem;
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
      }
      
      .chat-messages::-webkit-scrollbar,
      .team-container::-webkit-scrollbar,
      .modal-content::-webkit-scrollbar,
      .result-panel::-webkit-scrollbar {
        width: 6px;
      }
      
      .chat-messages::-webkit-scrollbar-track,
      .team-container::-webkit-scrollbar-track,
      .modal-content::-webkit-scrollbar-track,
      .result-panel::-webkit-scrollbar-track {
        background: #161b22;
      }
      
      .chat-messages::-webkit-scrollbar-thumb,
      .team-container::-webkit-scrollbar-thumb,
      .modal-content::-webkit-scrollbar-thumb,
      .result-panel::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 3px;
      }
      
      .chat-messages::-webkit-scrollbar-thumb:hover,
      .team-container::-webkit-scrollbar-thumb:hover,
      .modal-content::-webkit-scrollbar-thumb:hover,
      .result-panel::-webkit-scrollbar-thumb:hover {
        background: #484f58;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BDc5BEjj.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
