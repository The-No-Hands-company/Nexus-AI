<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus AI</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
          Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        background-color: #f5f5f5;
        height: 100vh;
        display: flex;
      }
      
      .App {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        height: 100%;
        background-color: white;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
      }
      
      .App-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 1.5rem;
        text-align: center;
      }
      
      .App-header h1 {
        margin: 0;
        font-size: 1.5rem;
      }
      
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      
      .chat-container {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 1rem;
        overflow: hidden;
      }
      
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding-bottom: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      
      .message {
        max-width: 80%;
        word-wrap: break-word;
      }
      
      .message.user {
        align-self: flex-end;
        background-color: #007bff;
        color: white;
        border-radius: 18px 18px 4px 18px;
        padding: 0.75rem 1rem;
      }
      
      .message.assistant {
        align-self: flex-start;
        background-color: #e9ecef;
        color: #333;
        border-radius: 18px 18px 18px 4px;
        padding: 0.75rem 1rem;
      }
      
      .message.image-message {
        align-self: center;
        max-width: 90%;
        text-align: center;
      }
      
      .message-content {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      .message-content p {
        margin: 0 0 0.25rem 0;
        line-height: 1.4;
        text-align: center;
      }
      
      .generated-image {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        margin: 0.5rem 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      
      .message-time {
        font-size: 0.75rem;
        opacity: 0.7;
        margin-top: 0.25rem;
        align-self: flex-end;
      }
      
      .chat-input-container {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      
      .input-tabs {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid #eee;
      }
      
      .tab-button {
        flex: 1;
        padding: 0.75rem;
        border: none;
        background-color: #f8f9fa;
        color: #6c757d;
        border-radius: 18px 18px 0 0;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      .tab-button.active {
        background-color: white;
        color: #007bff;
        border-bottom: 2px solid #007bff;
      }
      
      .tab-button:hover:not(.active) {
        background-color: #e9ecef;
      }
      
      .chat-input {
        display: flex;
        gap: 0.5rem;
      }
      
      .chat-input textarea,
      .chat-input input {
        flex: 1;
        min-height: 40px;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 18px;
        font-size: 0.9rem;
        resize: vertical;
      }
      
      .chat-input textarea:focus,
      .chat-input input:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
      }
      
      .button-group {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      
      .button-group button {
        flex: 1;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 0.75rem;
        border-radius: 18px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      
      .button-group button:hover:not(:disabled) {
        opacity: 0.9;
      }
      
      .button-group button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: #ccc;
      }
      
      /* Scrollbar styling */
      .chat-messages::-webkit-scrollbar {
        width: 6px;
      }
      
      .chat-messages::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      
      .chat-messages::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 3px;
      }
      
      .chat-messages::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
